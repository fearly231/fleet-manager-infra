apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fleet-ingress
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    # To obcina /api zanim zapytanie trafi do Twojego kodu w Pythonie
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      # 1. Ruch do Backendu (wszystko co ma /api/ na początku)
      - path: /api(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000
      
      # 2. Ruch do dokumentacji Swaggera (FastAPI używa /docs i /openapi.json)
      - path: /docs(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000
      - path: /openapi.json
        pathType: Exact
        backend:
          service:
            name: backend-service
            port:
              number: 8000

      # 3. Cała reszta ruchu leci na Frontend Next.js
      - path: /()(.*)
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 3000
